<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkAnalysis — Tree Layout</title>
<meta name="description" content="Tidy hierarchical (Walker-style) tree layout with animated POLE card nodes.">
<style>
  :root{ --bg:#070b14; --ink:#c4d8e8; --dim:#7089a1; --cyan:#37e0ff; --line:color-mix(in oklab,#37e0ff 18%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:-apple-system,"Segoe UI",Roboto,sans-serif; color-scheme:dark; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1000px 700px at 50% -10%,color-mix(in oklab,var(--cyan) 9%,transparent),transparent 60%),var(--bg);
    color:var(--ink);font-family:var(--mono);overflow:hidden}
  #bar{position:fixed;top:0;left:0;right:0;height:52px;z-index:5;display:flex;align-items:center;gap:14px;padding:0 18px;
    background:color-mix(in oklab,#0a1220 75%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  #bar b{font-family:var(--sans);font-weight:800;font-size:15px;color:#eaf6ff}
  #bar .tag{color:var(--cyan);font-size:10px;letter-spacing:.28em}
  #bar .spacer{flex:1}
  #bar a{color:var(--dim);text-decoration:none;font-size:11px;letter-spacing:.1em;border:1px solid var(--line);padding:6px 11px;border-radius:4px}
  #bar a:hover{color:var(--cyan);border-color:var(--cyan)}
  #hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--dim);background:color-mix(in oklab,#0a1220 70%,transparent);border:1px solid var(--line);
    padding:6px 14px;border-radius:20px}
  #hint b{color:var(--cyan)}
  canvas{position:fixed;inset:0;display:block}
</style>
</head>
<body>
<div id="bar"><b>LINKANALYSIS</b><span class="tag">TREE LAYOUT · WALKER</span><span class="spacer"></span>
  <a href="index.html">← ALL DEMOS</a></div>
<div id="hint"><b>Click</b> a card to collapse / expand · hover to trace lineage</div>
<canvas id="c"></canvas>
<script>
(() => {
  "use strict";
  const RM = matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  const TYPE = { case:"#37e0ff", person:"#3aa0ff", location:"#2fe08a", vehicle:"#b072ff", rap_sheet:"#ffab3d", group:"#7c8aa5" };

  // A POLE investigation hierarchy.
  const DATA = { id:"c", type:"case", name:"Case #4471-FX", role:"Primary", children:[
    { id:"s", type:"person", name:"Eric Fox", role:"Subject", children:[
      { id:"fam", type:"group", name:"Family", role:"3 kin", children:[
        { id:"w", type:"person", name:"Jane Fox", role:"Spouse" },
        { id:"b", type:"person", name:"Sam Fox", role:"Sibling" },
      ]},
      { id:"assoc", type:"group", name:"Associates", role:"2 known", children:[
        { id:"a1", type:"person", name:"Rick Vale", role:"Associate", children:[
          { id:"nova", type:"location", name:"Nova Motel", role:"Sighted" },
        ]},
        { id:"a2", type:"person", name:"Marcus Reed", role:"Associate", children:[
          { id:"pier", type:"location", name:"Pier 42 Whse", role:"Operates" },
          { id:"boat", type:"vehicle", name:"MV Kingfisher", role:"Registered" },
        ]},
      ]},
      { id:"addr", type:"group", name:"Addresses", role:"1 home", children:[
        { id:"home", type:"location", name:"3260 Jay St", role:"Residence" },
      ]},
      { id:"rec", type:"group", name:"Records", role:"1 arrest", children:[
        { id:"r1", type:"rap_sheet", name:"Arrest 2020", role:"On record" },
      ]},
    ]},
  ]};

  // Build node list with parent links.
  const nodes=[]; const CW=158, CH=48, GAPX=26, GAPY=42;
  (function walk(n,parent){ n.parent=parent||null; n.collapsed=false; n.x=n.tx=0; n.y=n.ty=0; n.a=0; nodes.push(n);
    (n.children||[]).forEach(c=>walk(c,n)); })(DATA,null);

  // Tidy layout: leaf-index for x, parent centered over visible children; y by depth.
  function layout(){
    let leaf=0;
    (function first(n,depth){ n.depth=depth;
      const kids=n.collapsed?[]:(n.children||[]);
      if(!kids.length){ n.lx=leaf++; }
      else { kids.forEach(k=>first(k,depth+1)); n.lx=(kids[0].lx+kids[kids.length-1].lx)/2; }
    })(DATA,0);
    // extents
    let maxLeaf=0,maxDepth=0; nodes.forEach(n=>{ if(!hidden(n)){ maxLeaf=Math.max(maxLeaf,n.lx); maxDepth=Math.max(maxDepth,n.depth);} });
    const spanX=(maxLeaf)*(CW+GAPX);
    const ox=(innerWidth-spanX)/2, oy=96;
    nodes.forEach(n=>{ n.tx=ox+n.lx*(CW+GAPX); n.ty=oy+n.depth*(CH+GAPY); });
  }
  function hidden(n){ let p=n.parent; while(p){ if(p.collapsed) return true; p=p.parent; } return false; }
  function visibleChildren(n){ return n.collapsed?[]:(n.children||[]); }

  const c=document.getElementById("c"), ctx=c.getContext("2d");
  let DPR=Math.min(devicePixelRatio||1,2), W,H, hover=null;
  function resize(){ W=innerWidth;H=innerHeight;DPR=Math.min(devicePixelRatio||1,2);
    c.width=W*DPR;c.height=H*DPR;c.style.width=W+"px";c.style.height=H+"px";ctx.setTransform(DPR,0,0,DPR,0,0); layout(); }
  addEventListener("resize",resize);

  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function ancestry(n){ const s=new Set(); let p=n; while(p){ s.add(p); p=p.parent; } return s; }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const path = hover ? ancestry(hover) : null;

    // connectors (elbow)
    ctx.lineWidth=1.6; ctx.lineCap="round";
    for(const n of nodes){ if(hidden(n))continue;
      for(const k of visibleChildren(n)){
        if(k.a<0.02) continue;
        const active = path && path.has(n) && path.has(k);
        const col=TYPE[k.type]||"#7c8aa5";
        const x1=n.x+CW/2, y1=n.y+CH, x2=k.x+CW/2, y2=k.y, my=(y1+y2)/2;
        ctx.strokeStyle=col; ctx.globalAlpha=(active?0.95:0.4)*k.a;
        ctx.shadowBlur=active?12:0; ctx.shadowColor=col;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1,my); ctx.lineTo(x2,my); ctx.lineTo(x2,y2); ctx.stroke();
      }
    }
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // cards
    for(const n of nodes){ if(hidden(n))continue;
      const col=TYPE[n.type]||"#7c8aa5";
      const sc=0.9+0.1*n.a; const w=CW*sc, h=CH*sc; const x=n.x+(CW-w)/2, y=n.y+(CH-h)/2;
      const focus = path ? path.has(n) : (n===hover);
      ctx.globalAlpha=n.a;
      // glow
      ctx.shadowBlur=focus?20:10; ctx.shadowColor=col;
      roundRect(x,y,w,h,7); ctx.fillStyle="#0e1626"; ctx.fill();
      ctx.shadowBlur=0;
      // left accent
      ctx.save(); roundRect(x,y,w,h,7); ctx.clip(); ctx.fillStyle=col; ctx.fillRect(x,y,4,h); ctx.restore();
      // border
      roundRect(x,y,w,h,7); ctx.lineWidth=focus?1.8:1; ctx.strokeStyle= focus?col:"color-mix(in oklab,#37e0ff 20%,transparent)"; ctx.strokeStyle=focus?col:"rgba(55,224,255,.2)"; ctx.stroke();
      // dot
      ctx.beginPath(); ctx.arc(x+16,y+h/2,4.5,0,7); ctx.fillStyle=col; ctx.shadowBlur=8; ctx.shadowColor=col; ctx.fill(); ctx.shadowBlur=0;
      // text
      ctx.textBaseline="middle"; ctx.textAlign="left";
      ctx.fillStyle="#eaf6ff"; ctx.font="700 12.5px "+"-apple-system, Segoe UI, sans-serif";
      ctx.fillText(clip(n.name,15), x+28, y+h/2-7);
      ctx.fillStyle="#7089a1"; ctx.font="9.5px ui-monospace, monospace";
      ctx.fillText((n.role||"").toUpperCase(), x+28, y+h/2+8);
      // collapse indicator
      const kids=(n.children||[]).length;
      if(kids){ ctx.fillStyle=col; ctx.font="10px ui-monospace, monospace"; ctx.textAlign="right";
        ctx.fillText(n.collapsed?"＋"+kids:"−", x+w-10, y+h/2); ctx.textAlign="left"; }
      ctx.globalAlpha=1;
    }
  }

  function nodeAt(px,py){ for(const n of nodes){ if(hidden(n))continue; if(px>=n.x&&px<=n.x+CW&&py>=n.y&&py<=n.y+CH) return n; } return null; }
  c.addEventListener("mousemove",e=>{ const h=nodeAt(e.clientX,e.clientY); if(h!==hover){hover=h; c.style.cursor=h?"pointer":"default";} });
  c.addEventListener("click",e=>{ const n=nodeAt(e.clientX,e.clientY); if(n&&(n.children||[]).length){ n.collapsed=!n.collapsed; layout(); } });

  let t0=null;
  function frame(ts){ if(t0===null)t0=ts;
    for(const n of nodes){ const vis=!hidden(n);
      const targetA = vis?1:0;
      n.a += (targetA-n.a)*(RM?1:0.18);
      const k=RM?1:0.2; n.x+=(n.tx-n.x)*k; n.y+=(n.ty-n.y)*k;
    }
    draw(); requestAnimationFrame(frame);
  }
  // entrance stagger
  resize();
  if(!RM){ nodes.forEach(n=>{ n.x=n.tx; n.y=n.ty-18; }); }
  else { nodes.forEach(n=>{ n.a=hidden(n)?0:1; n.x=n.tx;n.y=n.ty; }); }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
